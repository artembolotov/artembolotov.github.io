        </g>
        <g class="tier-map-node" data-tier-node="t1b">
          <rect x="528" y="41" width="104" height="38" rx="8"/>
          <text class="tier-map-node-name" x="580" y="58" text-anchor="middle">Магистраль США</text>
          <text class="tier-map-node-sub" x="580" y="71" text-anchor="middle">Tier 1</text>

        <circle class="tier-map-packet" data-tier-packet r="6" cx="104" cy="326"/>

    </div>
    <div class="tier-map-caption" data-tier-caption aria-live="polite">Куда отправить пакет? Выберите наверху — и следите, как он пойдёт по пирамиде провайдеров.</div>
  </div>
  <script>
  (function () {
    var root = document.getElementById('tier-map');
    if (!root) { return; }

    var caption = root.querySelector('[data-tier-caption]');
    var packet = root.querySelector('[data-tier-packet]');
    var buttons = root.querySelectorAll('[data-tier-action]');

    var nodes = {}, edges = {}, tags = {};
    var list = root.querySelectorAll('[data-tier-node]');
    for (var i = 0; i < list.length; i++) { nodes[list[i].getAttribute('data-tier-node')] = list[i]; }
    list = root.querySelectorAll('[data-tier-edge]');
    for (i = 0; i < list.length; i++) { edges[list[i].getAttribute('data-tier-edge')] = list[i]; }
    list = root.querySelectorAll('[data-tier-tag]');
    for (i = 0; i < list.length; i++) { tags[list[i].getAttribute('data-tier-tag')] = list[i]; }

    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var EDGE_MS = reduceMotion ? 0 : 650;
    var CABLE_MS = reduceMotion ? 0 : 1500;
    var HOP_MS = 1900;

    var PAID = ['e1', 'e4', 'e5', 'e6', 'e8', 'e9'];
    var FREE = ['e2', 'e3', 'e7'];

    var SCENARIOS = {
      local: {
        nodes: ['you', 't3a', 'ixp', 't3b', 'nb'],
        edges: [{ id: 'e1' }, { id: 'e2', tag: 'ixp' }, { id: 'e3' }, { id: 'e4', rev: true }],
        captions: [
          'Пакет выходит из квартиры. Первый шаг всегда один — к вашему провайдеру.',
          'Провайдер смотрит на адрес: это клиент другого провайдера в этом же городе. С ним есть пиринг на точке обмена.',
          'Точка обмена — общий коммутатор в нейтральном дата-центре. Заехали, передали соседу напрямую, бесплатно.',
          'Другой провайдер получил пакет и везёт его по своей сети до своего клиента.',
          'Готово! Пакет так и не поднялся выше Tier 3: локальный трафик срезает путь через точку обмена.'
        ]
      },
      abroad: {
        nodes: ['you', 't3a', 't2a', 't1a', 't1b', 't2b', 'dc'],
        edges: [{ id: 'e1' }, { id: 'e5', tag: 'e5' }, { id: 'e6', tag: 'e6' }, { id: 'e7', tag: 'e7', slow: true }, { id: 'e8', rev: true, tag: 'e8' }, { id: 'e9', rev: true, tag: 'e9' }],
        captions: [
          'Пакет выходит из квартиры — как всегда, сначала к вашему провайдеру.',
          'Адрес — за океаном. Своих кабелей туда у провайдера нет: он отдаёт пакет наверх, оператору региона. За этот транзит он платит.',
          'У оператора региона сеть на всю страну — но не через океан. Дальше наверх, магистральному Tier 1. Тоже за деньги.',
          'Tier 1. Выше некуда — зато у него есть собственный кабель по дну Атлантики. Ныряем.',
          '6500 км по дну океана — и пакет у американского Tier 1. Друг другу они не платят: между Tier 1 только пиринг.',
          'Теперь вниз по той же пирамиде: Tier 1 передаёт пакет оператору, у которого обслуживается дата-центр.',
          'Пакет прошёл пирамиду насквозь: вверх, через океан и вниз. А деньги за этот путь текли только снизу вверх — нажмите „Кто кому платит“.'
        ]
      }
    };

    var running = false;
    var ran = { local: false, abroad: false };

    function setCaption(html, isResult) {
      caption.innerHTML = html;
      caption.classList.toggle('tier-map-caption--result', !!isResult);
    }

    function clearState() {
      var key;
      for (key in nodes) { nodes[key].classList.remove('is-active', 'is-done'); }
      for (key in edges) { edges[key].classList.remove('is-done', 'is-paid', 'is-free'); }
      for (key in tags) { tags[key].classList.remove('is-shown'); }
      packet.classList.remove('is-shown');
    }

    function setBusy(busy) {
      running = busy;
      for (var b = 0; b < buttons.length; b++) { buttons[b].disabled = busy; }
    }

    function movePacket(pathEl, rev, dur, done) {
      var len = pathEl.getTotalLength();
      var start = null;
      function place(dist) {
        var p = pathEl.getPointAtLength(dist);
        packet.setAttribute('cx', p.x);
        packet.setAttribute('cy', p.y);
      }
      if (!dur) { place(rev ? 0 : len); done(); return; }
      place(rev ? len : 0);
      packet.classList.add('is-shown');
      function frame(ts) {
        if (start === null) { start = ts; }
        var t = Math.min((ts - start) / dur, 1);
        place(len * (rev ? 1 - t : t));
        if (t < 1) { requestAnimationFrame(frame); } else { done(); }
      }
      requestAnimationFrame(frame);
    }

    function run(key) {
      var sc = SCENARIOS[key];
      clearState();
      setBusy(true);
      function arrive(idx) {
        var name = sc.nodes[idx];
        if (idx > 0) {
          var prev = nodes[sc.nodes[idx - 1]];
          prev.classList.remove('is-active');
          prev.classList.add('is-done');
        }
        nodes[name].classList.add('is-active');
        var last = idx === sc.nodes.length - 1;
        var text = sc.captions[idx];
        if (last) {
          ran[key] = true;
          if (key === 'local' && !ran.abroad) { text += ' Теперь отправьте пакет за океан — маршрут будет совсем другой.'; }
          packet.classList.remove('is-shown');
          setCaption(text, true);
          setBusy(false);
          return;
        }
        setCaption(text, false);
        setTimeout(function () {
          var step = sc.edges[idx];
          movePacket(edges[step.id], step.rev, step.slow ? CABLE_MS : EDGE_MS, function () {
            edges[step.id].classList.add('is-done');
            if (step.tag) { tags[step.tag].classList.add('is-shown'); }
            arrive(idx + 1);
          });
        }, HOP_MS);
      }
      arrive(0);
    }

    function money() {
      clearState();
      var i;
      for (i = 0; i < PAID.length; i++) { edges[PAID[i]].classList.add('is-paid'); }
      for (i = 0; i < FREE.length; i++) { edges[FREE[i]].classList.add('is-free'); }
      for (var key in tags) { tags[key].classList.add('is-shown'); }
      setCaption('Деньги текут снизу вверх: вы платите своему провайдеру, он — оператору региона, тот — магистрали. Дата-центр на той стороне платит так же. Оранжевые стрелки — платный транзит, зелёное — пиринг, бесплатный обмен между равными.', false);
    }

    for (var b = 0; b < buttons.length; b++) {
      buttons[b].addEventListener('click', function () {
        if (running) { return; }
        for (var j = 0; j < buttons.length; j++) {
          buttons[j].classList.toggle('is-active', buttons[j] === this);
        }
        var action = this.getAttribute('data-tier-action');
        if (action === 'money') { money(); } else { run(action); }
      });
    }
  })();
  </script>
