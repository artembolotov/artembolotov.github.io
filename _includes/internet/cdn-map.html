    <div class="cdn-map-stage">

        <text class="cdn-map-label" x="284" y="102" text-anchor="middle">Сингапур</text>
        <text class="cdn-map-cache" data-cdn-cache="sin" x="284" y="123" text-anchor="middle"></text>
        <rect class="cdn-map-edge-dot" x="137.5" y="142.5" width="7" height="7" rx="1.5"/>
        <circle class="cdn-map-user" cx="133" cy="146" r="3.2"/>
        <text class="cdn-map-label" x="136" y="159" text-anchor="middle">Сан-Паулу</text>
        <text class="cdn-map-cache" data-cdn-cache="sao" x="136" y="169" text-anchor="middle"></text>
        <circle class="cdn-map-user" cx="218" cy="28" r="3.2"/>
        <text class="cdn-map-label" x="224" y="26" text-anchor="start">Москва</text>
        <circle class="cdn-map-user" cx="320" cy="58" r="3.2"/>

        <circle class="cdn-map-packet" data-cdn-packet="msk" r="2.8"/>

        <circle class="cdn-map-packet" data-cdn-packet="sao" r="2.8"/>
      </svg>
    </div>
    <div class="cdn-map-results">
      <span class="cdn-map-chip"><span class="cdn-map-chip-city">Москва</span><b class="cdn-map-chip-ms" data-cdn-ms="msk">—</b></span>
      <span class="cdn-map-chip"><span class="cdn-map-chip-city">Токио</span><b class="cdn-map-chip-ms" data-cdn-ms="tyo">—</b></span>
      <span class="cdn-map-chip"><span class="cdn-map-chip-city">Сан-Паулу</span><b class="cdn-map-chip-ms" data-cdn-ms="sao">—</b></span>
    </div>
    <div class="cdn-map-caption" data-cdn-caption aria-live="polite">Три пользователя открывают один сайт. Его origin-сервер — в Калифорнии, а во Франкфурте, Сингапуре и Сан-Паулу стоят edge-серверы CDN (зелёные квадраты). Выберите сценарий и сравните время ответа.</div>
  </div>
  <script>
  (function () {
    var root = document.getElementById('cdn-map');
    if (!root) { return; }

    var caption = root.querySelector('[data-cdn-caption]');
    var buttons = root.querySelectorAll('[data-cdn-action]');

    var paths = {}, packets = {}, counters = {}, caches = {};
    var list = root.querySelectorAll('[data-cdn-path]');
    for (var i = 0; i < list.length; i++) { paths[list[i].getAttribute('data-cdn-path')] = list[i]; }
    list = root.querySelectorAll('[data-cdn-packet]');
    for (i = 0; i < list.length; i++) { packets[list[i].getAttribute('data-cdn-packet')] = list[i]; }
    list = root.querySelectorAll('[data-cdn-ms]');
    for (i = 0; i < list.length; i++) { counters[list[i].getAttribute('data-cdn-ms')] = list[i]; }
    list = root.querySelectorAll('[data-cdn-cache]');
    for (i = 0; i < list.length; i++) { caches[list[i].getAttribute('data-cdn-cache')] = list[i]; }

    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var SPEED = 9; // миллисекунды анимации на одну миллисекунду задержки
    var MIN_LEG = 300;
    var MISS_WAIT = 700;

    var USERS = [
      { id: 'msk', edge: 'fra', toEdge: 'msk-fra', edgeOrg: 'fra-org', direct: 'msk-org', ms: { direct: 180, first: 190, cached: 40 } },
      { id: 'tyo', edge: 'sin', toEdge: 'tyo-sin', edgeOrg: 'sin-org', direct: 'tyo-org', ms: { direct: 110, first: 240, cached: 60 } },
      { id: 'sao', edge: 'sao', toEdge: 'sao-edge', edgeOrg: 'sao2-org', direct: 'sao-org', ms: { direct: 190, first: 195, cached: 5 } }
    ];

    var CAPTIONS = {
      direct: {
        run: 'Все три запроса летят к одному серверу в Калифорнии. Счётчики показывают время полёта туда и обратно.',
        done: 'Без CDN каждый запрос идёт через полмира: 110–190 мс на один только полёт туда-обратно. А таких полётов до первого байта нужно три-четыре — рукопожатия, помните? Теперь включите CDN.'
      },
      first: {
        run: 'Кэш edge-серверов пока пуст: запрос добегает до ближайшей точки, не находит там копию — и edge сам отправляется к origin за оригиналом.',
        done: 'Первый посетитель выигрыша почти не получил: edge всё равно сходил в Калифорнию. Зато копия осталась в кэше — нажмите «из кэша» и посмотрите, что достанется следующим.'
      },
      cached: {
        run: 'Копии уже разложены по edge-серверам. Запросы дальше соседнего дата-центра не уходят.',
        done: '5 мс в Сан-Паулу — PoP в том же городе. 60 мс в Токио — из Сингапура. 40 мс в Москве — из Франкфурта: коробки поближе, увы, выключены. Сравните со 110–190 мс без CDN — и так с каждым файлом страницы.'
      }
    };

    var running = false;

    function setCaption(html, isResult) {
      caption.innerHTML = html;
      caption.classList.toggle('cdn-map-caption--result', !!isResult);
    }

    function setCache(edgeId, state) {
      var el = caches[edgeId];
      el.classList.remove('is-miss', 'is-hit');
      if (state === 'miss') {
        el.textContent = '✕ мимо кэша';
        el.classList.add('is-miss');
      } else if (state === 'hit') {
        el.textContent = '📦 копия в кэше';
        el.classList.add('is-hit');
      } else {
        el.textContent = '';
      }
    }

    function clearState() {
      var key;
      for (key in paths) { paths[key].classList.remove('is-done'); }
      for (key in packets) { packets[key].classList.remove('is-shown'); }
      for (key in counters) {
        counters[key].textContent = '—';
        counters[key].classList.remove('is-final');
      }
      for (key in caches) { setCache(key, null); }
    }

    function setBusy(busy) {
      running = busy;
      for (var b = 0; b < buttons.length; b++) { buttons[b].disabled = busy; }
    }

    function legsFor(u, mode) {
      var h;
      if (mode === 'direct') {
        h = u.ms.direct / 2;
        return [{ p: u.direct, ms: h }, { p: u.direct, rev: true, ms: h }];
      }
      if (mode === 'cached') {
        h = u.ms.cached / 2;
        return [{ p: u.toEdge, ms: h }, { p: u.toEdge, rev: true, ms: h }];
      }
      var eh = u.ms.cached / 2;
      var oh = (u.ms.first - u.ms.cached) / 2;
      return [
        { p: u.toEdge, ms: eh },
        { wait: true, cache: 'miss' },
        { p: u.edgeOrg, ms: oh },
        { p: u.edgeOrg, rev: true, ms: oh },
        { cache: 'hit' },
        { p: u.toEdge, rev: true, ms: eh }
      ];
    }

    function runUser(u, mode, done) {
      var legs = legsFor(u, mode);
      var total = u.ms[mode];
      var packet = packets[u.id];
      var counter = counters[u.id];
      var moved = 0;

      function tick(v) { counter.textContent = Math.round(v) + ' мс'; }

      function step(idx) {
        if (idx >= legs.length) {
          tick(total);
          counter.classList.add('is-final');
          packet.classList.remove('is-shown');
          done();
          return;
        }
        var leg = legs[idx];
        if (leg.wait) {
          setCache(u.edge, leg.cache);
          setTimeout(function () { step(idx + 1); }, reduceMotion ? 0 : MISS_WAIT);
          return;
        }
        if (leg.cache) {
          setCache(u.edge, leg.cache);
          step(idx + 1);
          return;
        }
        var pathEl = paths[leg.p];
        var len = pathEl.getTotalLength();
        var dur = reduceMotion ? 0 : Math.max(leg.ms * SPEED, MIN_LEG);
        function place(dist) {
          var pt = pathEl.getPointAtLength(dist);
          packet.setAttribute('cx', pt.x);
          packet.setAttribute('cy', pt.y);
        }
        function finish() {
          moved += leg.ms;
          tick(moved);
          pathEl.classList.add('is-done');
          step(idx + 1);
        }
        if (!dur) { place(leg.rev ? 0 : len); finish(); return; }
        place(leg.rev ? len : 0);
        packet.classList.add('is-shown');
        var start = null;
        function frame(ts) {
          if (start === null) { start = ts; }
          var t = Math.min((ts - start) / dur, 1);
          place(len * (leg.rev ? 1 - t : t));
          tick(moved + leg.ms * t);
          if (t < 1) { requestAnimationFrame(frame); } else { finish(); }
        }
        requestAnimationFrame(frame);
      }

      step(0);
    }

    function run(mode) {
      clearState();
      if (mode === 'cached') {
        for (var key in caches) { setCache(key, 'hit'); }
      }
      setBusy(true);
      setCaption(CAPTIONS[mode].run, false);
      var left = USERS.length;
      for (var i = 0; i < USERS.length; i++) {
        runUser(USERS[i], mode, function () {
          left--;
          if (left === 0) {
            setCaption(CAPTIONS[mode].done, true);
            setBusy(false);
          }
        });
      }
    }

    for (var b = 0; b < buttons.length; b++) {
      buttons[b].addEventListener('click', function () {
        if (running) { return; }
        for (var j = 0; j < buttons.length; j++) {
          buttons[j].classList.toggle('is-active', buttons[j] === this);
        }
        run(this.getAttribute('data-cdn-action'));
      });
    }
  })();
  </script>
</div>
